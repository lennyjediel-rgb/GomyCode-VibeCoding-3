<!DOCTYPE html>
<-
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }

    .pricing {
      width: 100%;
      max-width: 320px;          /* better than fixed 300px */
      margin: 16px auto;
      background-color: #fff;
      box-shadow: 0 0 10px #ccc; /* fixed typo */
      padding: 16px;
      text-align: left;
      border-radius: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px 0;
    }

    .price {
      font-size: 18px;
      color: #0a7a0a;
      margin: 0 0 12px 0;
    }

    .features {
      list-style: none;
      padding: 0;
      margin: 0 0 12px 0;
    }

    .features li {
      padding: 8px 0;           /* more comfortable spacing */
      border-bottom: 1px solid #eee;
    }

    .features li:last-child {
      border-bottom: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      width: 100%;             /* easier to tap on mobile */
      padding: 12px 16px;
      background: #1e5eff;
      color: #fff;

      border: none;
      border-radius: 10px;
      cursor: pointer;

      margin-top: 6px;
      font-weight: 600;

      transition: background-color 180ms ease, transform 120ms ease, box-shadow 180ms ease;
      box-shadow: 0 6px 14px rgba(30, 94, 255, 0.22);
    }

    .btn:hover {
      background: #0b3fbf;
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .btn:focus-visible {
      outline: 3px solid rgba(30, 94, 255, 0.35);
      outline-offset: 2px;
    }

    /* Small-screen improvements (optional, but helps a lot) */
    @media (max-width: 480px) {
      .pricing {
        max-width: 100%;
        margin: 12px;
      }
      .title { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div class="pricing">
    <h2 class="title">Basic Plan</h2>
    <p class="price">$9.99 /month</p>

    <ul class="features">
      <li>1 GB Storage</li>
      <li>Basic Support</li>
      <li>All Core Features</li>
    </ul>

    <button class="btn" type="button">Start Trial</button>
  </div>

</body>
</html>
